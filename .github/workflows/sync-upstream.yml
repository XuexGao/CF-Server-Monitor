name: Sync Upstream

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 确保检出当前默认分支（通常是 main）
          ref: ${{ github.head_ref || 'main' }}

      - name: ⬆️ Sync upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 安全处理 upstream remote
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/huilang-me/CF-Server-Monitor.git
          else
            git remote add upstream https://github.com/huilang-me/CF-Server-Monitor.git
          fi

          git fetch upstream

          # 自动检测上游默认分支（不硬编码 main）
          UPSTREAM_BRANCH=$(git remote show upstream | grep 'HEAD branch' | cut -d' ' -f5)
          echo "Upstream default branch: $UPSTREAM_BRANCH"

          # 备份当前 workflow 文件（自身）
          cp .github/workflows/sync-upstream.yml /tmp/sync-upstream.yml

          # 强制重置到上游最新
          git reset --hard upstream/$UPSTREAM_BRANCH

          # 恢复本 workflow 文件
          mkdir -p .github/workflows
          cp /tmp/sync-upstream.yml .github/workflows/sync-upstream.yml
          git add .github/workflows/sync-upstream.yml

          # 只有真正有变更时才提交
          if ! git diff --cached --quiet; then
            git commit -m "chore: keep sync-upstream workflow"
          fi

          # 使用 --force-with-lease 更安全，且指定本地分支为当前分支
          git push origin HEAD:main --force-with-lease
